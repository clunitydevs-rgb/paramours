<div class="container mt-4 timeline-section">
  <div class="timeline-head">
    <div>
      <span class="timeline-kicker">Publicaciones</span>
      <h2 class="timeline-title">Revisa mis publicaciones</h2>
    </div>
  </div>

  <div *ngIf="pageIndex > 0 && ArraPublications.length === 0" class="timeline-empty">
    <i class="bi bi-images"></i>
    <span>Aun no hay publicaciones para mostrar.</span>
  </div>

  <div class="timeline-list">
    <article *ngFor="let data of ArraPublications, let i=index" id="commnet{{i}}" class="section-pub-comment">
      <header class="comment-toolbar">
        <div class="image-profile-comment">
          <div class="comment-avatar" [style.background-image]="'url(' + sUrlProfile + ')'"></div>
          <div class="comment-author">
            <span class="comment-author-name">{{sNomUser}}</span>
            <span class="lbl-dt-publications">Publicado {{data.fecha | date : 'dd-MM-yyyy HH:mm'}}</span>
          </div>
        </div>
        <div [hidden]="showDelete" class="btnDeleteImag">
          <button type="button" class="cBtnDel" (click)="onDeletePublication(data.iD_PUBLICACION, i)"
            aria-label="Eliminar publicacion"><i class="bi bi-trash"></i></button>
        </div>
      </header>

      <div *ngIf="data.comentario != null" class="comment-copy">
        <span [innerHTML]="SanitizedHTML(data.comentario)" class="comments-text"></span>
      </div>

      <div *ngIf="data.mediA_TYPE !=''" class="comment-container-img">
        <div class="comment-image-container">
          <img *ngIf="data.mediA_TYPE.indexOf('video') === -1" [src]="sUrlRps + data.noM_MEDIA"
            (click)="onPreviewImg(i)" data-bs-toggle="modal" data-bs-target="#myViewVideo"
            class="comment-image-show" loading="lazy" alt="Imagen de publicacion">
          <img *ngIf="data.mediA_TYPE.indexOf('video') !== -1 && data.thumbnail != ''"
            [src]="sUrlRps + data.thumbnail" (click)="onPreviewImg(i)" data-bs-toggle="modal"
            data-bs-target="#myViewVideo" class="comment-image-show" loading="lazy" alt="Video de publicacion">
          <div *ngIf="data.mediA_TYPE.indexOf('video') !== -1 && data.thumbnail != ''" class="btn-comment-VideoImg">
            <button type="button" class="cBtn-comment-Play" (click)="onPreviewImg(i)" data-bs-toggle="modal"
              data-bs-target="#myViewVideo" aria-label="Reproducir video"><i class="bi bi-play-fill"></i></button>
          </div>
        </div>
      </div>
    </article>
  </div>
</div>

@defer (when showDelete === false) {
  <app-profile-post-editor (posted)="LoadPublications(true)"></app-profile-post-editor>
}

<div class="modal fade" id="myViewVideo" tabindex="-1" role="dialog" aria-labelledby="myViewVideoLabel"
  aria-hidden="true">
  <div class="modal-dialog modal-fullscreen modal-dialog-centered video-lightbox-container">
    <!-- Agrega modal-fullscreen -->
    <div class="modal-content d-flex justify-content-center align-items-center lightbox">
      <button class="close-btn" (click)="onCleanObject()" data-bs-dismiss="modal" aria-label="Close">
        <i class="bi bi-x-circle icon-close"></i>
      </button>
      <div #htmlContent class="lightbox-img">
      </div>
    </div>
  </div>
</div>
